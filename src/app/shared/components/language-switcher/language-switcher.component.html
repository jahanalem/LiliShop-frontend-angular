@if (languageService.languages().length > 1) {
  <button mat-button type="button" class="language-trigger" [matMenuTriggerFor]="languageMenu"
    [attr.aria-label]="TranslationKeys.Nav.ChooseLanguage | translate"
    [title]="TranslationKeys.Nav.ChooseLanguage | translate">
    <mat-icon>language</mat-icon>
    <span class="language-name" [attr.lang]="languageService.currentCode()">{{ currentLanguageName() }}</span>
    <mat-icon class="dropdown-arrow">arrow_drop_down</mat-icon>
  </button>

  <mat-menu #languageMenu="matMenu" xPosition="before">
    @for (language of languageService.languages(); track language.code) {
      <button mat-menu-item type="button" class="language-option"
        [class.is-active]="language.code === languageService.currentCode()"
        [attr.lang]="language.code"
        (click)="languageService.setLanguage(language.code)">
        <mat-icon>{{ language.code === languageService.currentCode() ? 'check' : '' }}</mat-icon>
        <span>{{ language.nativeName }}</span>
      </button>
    }
  </mat-menu>
}
