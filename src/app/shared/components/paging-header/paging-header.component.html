<header>
  @if (hasResults()) {
    <span class="visible-items">
      {{ TranslationKeys.Paging.ShowingRange | translate: [getStartItem(), getEndItem(), totalCount()] }}
    </span>
  }
  @if (noResults()) {
    <span>
      {{ TranslationKeys.Paging.NoResults | translate }}
    </span>
  }
</header>
