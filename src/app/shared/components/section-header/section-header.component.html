@if ((breadcrumb$ | async); as breadcrumbs) {
  @if (breadcrumbs.length > 1) {
    <section class="py-1 bg-light">
      <div class="container ">
        <div class="row">
          <div class="col-lg-12 text-end">
            <nav aria-label="breadcrumb">
              <xng-breadcrumb>
                <ng-container *xngBreadcrumbItem="let breadcrumb">{{ breadcrumb | translate }}</ng-container>
              </xng-breadcrumb>
            </nav>
          </div>
        </div>
      </div>
    </section>
  }
}
