<div class="admin-page">
  <header class="admin-page-header">
    <div>
      <h1 class="admin-page-title">Product Type</h1>
      <p class="admin-page-subtitle">Name the type and control its availability.</p>
    </div>
    <button type="button" mat-stroked-button (click)="navigateBack()">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>
  </header>

  <form [formGroup]="typeForm" (ngSubmit)="onSubmit()" class="admin-form-card entity-form">
    <mat-checkbox formControlName="isActive" (change)="onIsActiveChange($event.checked)">Is Active?</mat-checkbox>

    <mat-form-field hintLabel="Max 20 characters" appearance="outline" class="full-width">
      <mat-label>Enter type name</mat-label>
      <input formControlName="name" matInput #input maxlength="20" placeholder="type name">
      <mat-hint align="end">{{input.value.length}}/20</mat-hint>
    </mat-form-field>

    <button type="submit" [disabled]="isSaveDisabled" [attr.aria-disabled]="isSaveDisabled.toString()"
      mat-flat-button class="save-button">Save</button>
  </form>
</div>
