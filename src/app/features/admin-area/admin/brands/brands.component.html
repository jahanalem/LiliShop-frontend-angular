<div class="admin-page">
  <header class="admin-page-header">
    <div>
      <h1 class="admin-page-title">Brands</h1>
      <p class="admin-page-subtitle">Manage the brands available for products.</p>
    </div>
    <button type="button" mat-flat-button [appCheckPolicy]="policyNames.RequireAtLeastAdministratorRole"
      (click)="createBrand()">
      <mat-icon>add</mat-icon>
      New Brand
    </button>
  </header>

  <div class="admin-table-card">
    <div class="admin-table-scroll">
      <table mat-table [dataSource]="brands()" matSort>
        @for(column of columnsToDisplay; track column) {
          <ng-container [matColumnDef]="column">
            <th mat-header-cell *matHeaderCellDef>
              @if (column !== 'Action') {
                <div mat-sort-header>{{column}}</div>
              } @else {
                {{column}}
              }
            </th>
            <td mat-cell *matCellDef="let row">
              @if(column === 'Action') {
                <button type="button" mat-icon-button aria-label="Edit brand"
                  [appCheckPolicy]="policyNames.RequireAtLeastAdministratorRole" (click)="editBrand(row.id)">
                  <mat-icon class="edit-icon">edit</mat-icon>
                </button>
                <button type="button" mat-icon-button aria-label="Delete brand"
                  [appCheckPolicy]="policyNames.RequireSuperAdminRole" (click)="deleteBrand(row.id)">
                  <mat-icon class="delete-icon">delete</mat-icon>
                </button>
              } @else {
                {{row[column] | formatValue:column}}
              }
            </td>
          </ng-container>
        }

        <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
        <tr mat-row *matRowDef="let row; columns: columnsToDisplay;"></tr>

        <tr *matNoDataRow>
          <td class="admin-empty-cell" [attr.colspan]="columnsToDisplay.length">No data available.</td>
        </tr>
      </table>
    </div>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" [length]="totalCount()" showFirstLastButtons
      aria-label="Select page of brands"></mat-paginator>
  </div>
</div>
