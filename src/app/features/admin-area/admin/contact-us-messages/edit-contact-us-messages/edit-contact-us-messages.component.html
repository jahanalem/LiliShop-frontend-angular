<div class="admin-page">
  <header class="admin-page-header">
    <div>
      <h1 class="admin-page-title">Message</h1>
      <p class="admin-page-subtitle">Customer contact message details.</p>
    </div>
    <button type="button" mat-stroked-button (click)="cancel()">
      <mat-icon>arrow_back</mat-icon>
      Back
    </button>
  </header>

  <div class="admin-form-card message-card">
    <form>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>First Name</mat-label>
        <input matInput [(ngModel)]="contactUsMessage().firstName" title="first name" name="firstName" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Last Name</mat-label>
        <input matInput [(ngModel)]="contactUsMessage().lastName" title="last name" name="lastName" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email Address</mat-label>
        <input matInput [(ngModel)]="contactUsMessage().email" title="email" name="email" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Message</mat-label>
        <textarea matInput [(ngModel)]="contactUsMessage().message" rows="15" cols="50" title="message" name="message"
          readonly></textarea>
      </mat-form-field>

      <div class="date-fields">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Created Date</mat-label>
          <input matInput [matDatepicker]="picker1" [(ngModel)]="contactUsMessage().createdDate" name="createdDate"
            title="created date" disabled>
          <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
          <mat-datepicker #picker1></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Modified Date</mat-label>
          <input matInput [matDatepicker]="picker2" [(ngModel)]="contactUsMessage().modifiedDate" name="modifiedDate"
            title="modified date" disabled>
          <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
          <mat-datepicker #picker2></mat-datepicker>
        </mat-form-field>
      </div>

      @if (enableReply) {
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Reply</mat-label>
          <textarea matInput placeholder="Write your reply here..." [(ngModel)]="replyMessage" name="replyMessage"
            [ngModelOptions]="{standalone: true}"></textarea>
        </mat-form-field>
      }
    </form>

    @if (enableReply) {
      <div class="form-actions">
        <button type="button" mat-flat-button (click)="sendReply()">Send Reply</button>
      </div>
    }
  </div>
</div>
