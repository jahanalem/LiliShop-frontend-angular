<mat-toolbar class="app-toolbar">
  @if (sidenav().mode === 'over') {
    <button mat-icon-button (click)="sidenav().toggle()" aria-label="Toggle sidebar">
      <mat-icon>{{ sidenav().opened ? 'close' : 'menu' }}</mat-icon>
    </button>
  }

  <div class="brand-wrapper" routerLink="/">
    <img alt="LiliShop logo" class="toolbar-logo" src="../../../../assets/img/logo-s.png" />
    <span class="app-title">LiliShop</span>
  </div>

  <span class="toolbar-spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="Open user menu" class="profile-button">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu" xPosition="before" class="modern-menu">
    <button mat-menu-item routerLink="/admin/profile">
      <mat-icon>person</mat-icon>
      <span>{{ TranslationKeys.Admin.Nav.Profile | translate }}</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()" class="logout-item">
      <mat-icon>exit_to_app</mat-icon>
      <span>{{ TranslationKeys.Nav.Logout | translate }}</span>
    </button>
  </mat-menu>
</mat-toolbar>

@if (busyService.loading()) {
  <mat-progress-bar
    mode="indeterminate"
    class="app-progress-bar">
  </mat-progress-bar>
}

<mat-sidenav-container class="app-sidenav-container">
  <mat-sidenav #sidenavComponent="matSidenav" class="app-sidenav" [opened]="sidenav().mode !== 'over'">
    <div class="sidenav-header">
      <h2 class="sidenav-app-title">{{ TranslationKeys.Nav.AdminPanel | translate }}</h2>
    </div>

    <mat-nav-list class="nav-list">
      @for (item of navItems; track item.name) {
        <a mat-list-item
           routerLink="{{ item.link }}"
           [routerLinkActiveOptions]="{ exact: true }"
           routerLinkActive="active-nav-item"
           class="nav-item">
          <mat-icon matListItemIcon class="nav-icon">{{ item.icon }}</mat-icon>
          <span matListItemTitle class="nav-item-name">{{ item.name | translate }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-sidenav-content">
    <main class="content-wrapper">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
