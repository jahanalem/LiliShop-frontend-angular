<section class="register-container">
  <div class="register-card">
    <section class="register-content">
      <form class="register-form" (ngSubmit)="onSubmit()">
        <app-text-input
          data-cy="display-name-container"
          [field]="registerForm.displayName"
          [label]="'Display Name'"
          class="full-width"
        />

        <app-text-input
          data-cy="email-container"
          [field]="registerForm.email"
          [label]="'Email address'"
          class="full-width"
        />

        <app-text-input
          data-cy="password-container"
          [field]="registerForm.password"
          [label]="'Password'"
          [type]="'password'"
          [showPasswordRules]="true"
          [autocomplete]="'new-password'"
          class="full-width"
        />

        <app-text-input
          data-cy="confirm-password-container"
          [field]="registerForm.confirmPassword"
          [label]="'Confirm Password'"
          [type]="'password'"
          [autocomplete]="'new-password'"
          class="full-width"
        />

        <button
          data-cy="submit-button"
          [disabled]="registerForm().invalid()"
          type="submit"
          mat-raised-button
          color="primary"
          class="full-width register-button"
        >
          <mat-icon>person_add</mat-icon> Register
        </button>

        @if (errors().length) {
          <ul class="error-list">
            @for (error of errors(); track error) {
              <li>{{ error }}</li>
            }
          </ul>
        }
      </form>
    </section>

    <div class="google-signin-container">
      <div id="buttonDiv" data-cy="google-signin-btn"></div>
    </div>
  </div>
</section>
