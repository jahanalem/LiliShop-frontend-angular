<div class="login-container">
  <mat-card>
    @if (stage() === 'credentials') {
      <mat-card-title>{{ TranslationKeys.Auth.LoginTitle | translate }}</mat-card-title>
      <mat-card-content>
        <form (ngSubmit)="onSubmit()">
          <!-- Email input -->
          <app-text-input
            data-cy="email"
            [field]="loginForm.email"
            [label]="TranslationKeys.Auth.EmailLabel | translate">
          </app-text-input>

          <!-- Password input -->
          <app-text-input
            data-cy="password"
            [field]="loginForm.password"
            [label]="TranslationKeys.Auth.PasswordLabel | translate"
            [type]="'password'">
          </app-text-input>

          @if (serverError()) {
            <p class="server-error" data-cy="login-error">{{ serverError() }}</p>
          }

          <!-- Submit button -->
          <button
            data-cy="submit-button"
            mat-raised-button
            color="primary"
            [disabled]="loginForm().invalid() || submitting()"
            type="submit">
            <mat-icon>login</mat-icon> {{ TranslationKeys.Auth.SignIn | translate }}
          </button>

          <div class="forgot-password">
            <a
              data-cy="forgot-password-link"
              routerLink="/account/forgot-password">
              {{ TranslationKeys.Auth.ForgotPassword | translate }}
            </a>
          </div>
        </form>
      </mat-card-content>
    } @else if (stage() === 'verify') {
      <mat-card-content>
        <app-mfa-verify
          [email]="credentials().email"
          [password]="credentials().password"
          (authenticated)="onVerified($event)"
          (cancelled)="onCancelMfa()">
        </app-mfa-verify>
      </mat-card-content>
    } @else {
      <mat-card-content>
        <app-mfa-setup
          [email]="credentials().email"
          [password]="credentials().password"
          (enrolled)="onEnrolled()"
          (cancelled)="onCancelMfa()">
        </app-mfa-setup>
      </mat-card-content>
    }
  </mat-card>
</div>
