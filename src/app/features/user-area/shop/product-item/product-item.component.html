@if(product()) {
<mat-card class="mat-elevation-z4 product-card">

  @if (isDiscountActive()) {
  <div class="sale-ribbon">SALE</div>
  }

  <a [routerLink]="['/shop', product().id]" class="image-container">
    @if (imageUrl()) {
      <img
        [ngSrc]="imageUrl()"
        width="287"
        height="287"
        class="product-image"
        [alt]="product().name"
        [priority]="isPriority()"
        sizes="(max-width: 600px) 45vw, (max-width: 960px) 30vw, 33vw"
      />
    }
  </a>

  <mat-card-content class="text-center">
    <a routerLink="/shop/{{product().id}}" class="product-link">
      <h3 class="mat-h3">{{product().name}}</h3>
    </a>
    <div class="d-flex align-items-center justify-content-center">
    <span class="fs-5 fw-bold text-success me-2">
        {{ product().price | currency }}
    </span>

    @if (product().previousPrice) {
      <span class="text-muted text-decoration-line-through">
          {{ product().previousPrice | currency }}
      </span>
    }
</div>
  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="addItemToBasket()" class="w-100">
      <mat-icon>shopping_cart</mat-icon> Add to Cart
    </button>
  </mat-card-actions>
</mat-card>
}
