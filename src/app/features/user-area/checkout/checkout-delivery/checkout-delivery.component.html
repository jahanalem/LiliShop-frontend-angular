<div class="delivery-section">
  <h4>{{ TranslationKeys.Checkout.ChooseDelivery | translate }}</h4>

  <mat-radio-group [value]="checkoutForm().delivery.deliveryMethod().value()">
    @for (dMethod of deliveryMethods(); track dMethod.id) {
      <mat-radio-button (click)="onDeliveryMethodChange(dMethod)" [value]="dMethod.id" class="delivery-option">
        <strong>{{ dMethod.shortName }} - {{ dMethod.price | currency }}</strong>
        <br />
        <span class="label-description">{{ dMethod.description }}</span>
      </mat-radio-button>
    }
  </mat-radio-group>
</div>

<div class="action-buttons">
  <button mat-stroked-button color="primary" cdkStepperPrevious>
    <mat-icon>arrow_back</mat-icon> {{ TranslationKeys.Checkout.BackToAddress | translate }}
  </button>
  <button mat-raised-button color="accent" [disabled]="checkoutForm().delivery().invalid()" cdkStepperNext>
    {{ TranslationKeys.Checkout.GoToReview | translate }} <mat-icon>arrow_forward</mat-icon>
  </button>
</div>
